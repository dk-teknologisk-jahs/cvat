metadata:
  name: pth-facebookresearch-sam3-unified
  namespace: cvat
  annotations:
    name: SAM3 Unified (Interactor + Text)
    version: 1
    type: interactor
    spec:
    min_pos_points: 0
    min_neg_points: 0
    startswith_box_optional: true
    # Also supports text-to-segment via mode parameter
    framework: pytorch
    supports_text_prompt: true
    help_message: |
      Unified SAM3 supporting both point/box prompts (interactor) and text prompts (detector).
      Uses a single model load. CPU version - slower but no GPU required.

spec:
  description: Unified SAM3 (CPU) - Interactor + Text-to-Segment in one function
  runtime: 'python:3.10'
  handler: main:handler
  eventTimeout: 300s
  env:
    - name: PYTHONPATH
      value: /opt/nuclio/sam3:/opt/nuclio
    - name: SAM3_USE_CPU
      value: "true"

  build:
    image: cvat.pth.facebookresearch.sam3.unified:latest-cpu
    baseImage: python:3.10-slim

    directives:
      preCopy:
      # disable interactive frontend
        - kind: ENV
          value: DEBIAN_FRONTEND=noninteractive
      # set workdir
        - kind: WORKDIR
          value: /opt/nuclio/sam3
      # install basic deps
        - kind: RUN
          value: apt-get update && apt-get -y install curl git ffmpeg libsm6 libxext6
      # install PyTorch CPU
        - kind: RUN
          value: pip3 install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      # install Python deps
        - kind: RUN
          value: pip3 install numpy pillow pycocotools
      # install SAM3 from GitHub
        - kind: RUN
          value: pip3 install git+https://github.com/facebookresearch/sam3.git
      # pre-download SAM3 checkpoint (will be cached in image)
        - kind: RUN
          value: |
            python3 -c "from huggingface_hub import hf_hub_download; hf_hub_download('facebook/sam3', 'sam3.pt')"

  triggers:
    myHttpTrigger:
      maxWorkers: 1
      kind: 'http'
      workerAvailabilityTimeoutMilliseconds: 60000
      attributes:
        maxRequestBodySize: 67108864

  platform:
    attributes:
      restartPolicy:
        name: always
        maximumRetryCount: 3
      mountMode: volume
