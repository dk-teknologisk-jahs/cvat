# =============================================================================
# SAM3 Unified ONNX Function
# =============================================================================
#
# Single nuclio function supporting all three CVAT AI tool types:
# - Interactor: Point/box prompts → embeddings for browser decoding
# - Detector: Text prompts → masks (PCS mode)
# - Tracker: Video object tracking
#
# IMPORTANT: Uses ONNX Runtime - NO HUGGINGFACE AUTH NEEDED AT RUNTIME!
#
# ONNX models must be exported first using export_hf_onnx.py (requires HF auth),
# then baked into this Docker image. Once built, no auth is needed.
#
# =============================================================================

metadata:
  name: onnx-facebookresearch-sam3-unified
  namespace: cvat
  annotations:
    name: SAM3 Unified (ONNX)
    version: 1
    type: interactor
    spec:
    min_pos_points: 0
    min_neg_points: 0
    startswith_box_optional: true
    # Supports multiple modes via 'mode' parameter:
    # - encode (interactor): Point/box prompts → embeddings for browser decoding
    # - text-to-segment (detector): Text prompts → masks
    # - track/* (tracker): Video object tracking
    framework: onnx
    supports_text_prompt: true
    help_message: |
      SAM3 Unified - Interactor + Detector + Tracker in one function.
      Uses ONNX Runtime (no HuggingFace auth needed at runtime).

      Modes:
      - encode: Point/box prompts for browser-side mask decoding
      - text-to-segment: Text prompts for automatic detection
      - track/init, track/frame: Video object tracking

spec:
  description: Unified SAM3 using ONNX Runtime - Interactor + Detector + Tracker
  runtime: 'python:3.10'
  handler: main:handler
  eventTimeout: 120s

  env:
    - name: PYTHONPATH
      value: /opt/nuclio/sam3
    # Model paths (relative to /opt/nuclio/sam3/models/)
    - name: SAM3_MODEL_DIR
      value: /opt/nuclio/sam3/models
    - name: SAM3_VISION_ENCODER
      value: /opt/nuclio/sam3/models/vision_encoder.onnx
    - name: SAM3_TEXT_ENCODER
      value: /opt/nuclio/sam3/models/text_encoder.onnx
    - name: SAM3_PCS_DECODER
      value: /opt/nuclio/sam3/models/pcs_decoder.onnx
    - name: SAM3_TRACKER_DECODER
      value: /opt/nuclio/sam3/models/tracker_decoder.onnx
    # Redis for video tracking state
    - name: REDIS_HOST
      value: cvat_redis
    - name: REDIS_PORT
      value: "6379"
    - name: REDIS_PASSWORD
      value: ""
    - name: REDIS_TTL
      value: "3600"

  build:
    image: cvat.onnx.facebookresearch.sam3.unified:latest-gpu
    baseImage: nvidia/cuda:12.4.1-cudnn-runtime-ubuntu22.04

    directives:
      preCopy:
      # Set NVIDIA container runtime
        - kind: ENV
          value: NVIDIA_VISIBLE_DEVICES=all
      # Disable interactive frontend
        - kind: ENV
          value: DEBIAN_FRONTEND=noninteractive
      # Set workdir
        - kind: WORKDIR
          value: /opt/nuclio/sam3
      # Install system dependencies
        - kind: RUN
          value: |
            apt-get update && \
            apt-get -y install curl git python3 python3-pip ffmpeg libsm6 libxext6 && \
            rm -rf /var/lib/apt/lists/*
      # Install Python dependencies (transformers for CLIP tokenizer in PCS mode)
        - kind: RUN
          value: pip3 install --no-cache-dir numpy pillow opencv-python-headless onnxruntime-gpu redis transformers
      # Create models directory
        - kind: RUN
          value: mkdir -p /opt/nuclio/sam3/models
      # =======================================================================
      # ONNX MODELS - Must be pre-exported and hosted somewhere accessible
      # =======================================================================
      # Option 1: Copy from local build context (if building with models)
      # Option 2: Download from your own hosting (e.g., S3, GCS, Azure Blob)
      # Option 3: Mount as volume at runtime
      #
      # Example download commands (replace URLs with your hosted models):
      # - kind: RUN
      #   value: |
      #     curl -L -o /opt/nuclio/sam3/models/vision_encoder.onnx \
      #       "https://your-storage.com/sam3/vision_encoder.onnx"
      # =======================================================================
      # Map python3 to python
        - kind: RUN
          value: ln -s /usr/bin/pip3 /usr/local/bin/pip && ln -s /usr/bin/python3 /usr/bin/python

  triggers:
    myHttpTrigger:
      maxWorkers: 1
      kind: 'http'
      workerAvailabilityTimeoutMilliseconds: 30000
      attributes:
        maxRequestBodySize: 67108864  # 64MB

  resources:
    limits:
      nvidia.com/gpu: 1

  platform:
    attributes:
      restartPolicy:
        name: always
        maximumRetryCount: 3
      mountMode: volume
