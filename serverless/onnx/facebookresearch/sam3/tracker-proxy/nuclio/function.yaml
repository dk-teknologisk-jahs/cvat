# =============================================================================
# SAM3 Tracker Proxy (CPU)
# =============================================================================
#
# Lightweight proxy that forwards tracker requests to the SAM3 detector function.
# This allows SAM3 to appear in CVAT's tracker menu without loading models twice.
#
# Memory usage: ~50MB (no models loaded)
# Requires: sam3-detector function must be deployed first (deploys first alphabetically)
#
# =============================================================================

metadata:
  name: onnx-facebookresearch-sam3-tracker-proxy
  namespace: cvat
  annotations:
    name: SAM3 Video Tracker (ONNX)
    version: 1
    type: tracker
    spec:
    framework: onnx
    help_message: |
      SAM3 video object tracker for tracking objects across frames.
      Initialize with a bounding box, then track through subsequent frames.

      Note: This is a proxy to the SAM3 detector function.

spec:
  description: SAM3 video object tracker (proxy to detector function)
  runtime: 'python:3.10'
  handler: main:handler
  eventTimeout: 120s

  env:
    - name: SAM3_DETECTOR_URL
      value: http://nuclio-nuclio-onnx-facebookresearch-sam3-detector:8080
    - name: SAM3_PROXY_TIMEOUT
      value: "120"

  build:
    image: cvat.onnx.facebookresearch.sam3.tracker.proxy:latest-cpu
    baseImage: python:3.10-slim

    directives:
      preCopy:
        - kind: ENV
          value: DEBIAN_FRONTEND=noninteractive
        - kind: RUN
          value: pip3 install --no-cache-dir requests

  triggers:
    myHttpTrigger:
      maxWorkers: 2
      kind: 'http'
      workerAvailabilityTimeoutMilliseconds: 10000
      attributes:
        maxRequestBodySize: 67108864  # 64MB

  platform:
    attributes:
      restartPolicy:
        name: always
        maximumRetryCount: 3
      mountMode: volume
