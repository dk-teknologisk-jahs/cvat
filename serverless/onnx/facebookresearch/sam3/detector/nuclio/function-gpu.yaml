# =============================================================================
# SAM3 Detector (ONNX) - Main Function
# =============================================================================
#
# Main SAM3 function that loads all ONNX models. Supports:
# - Detector: Text prompts → masks (PCS mode) - NATIVE
# - Interactor: Point/box prompts → embeddings (via interactor-proxy)
# - Tracker: Video object tracking (via tracker-proxy)
#
# This is the main function that deploys FIRST (alphabetically) and loads
# all models. The proxies forward requests to this function.
#
# IMPORTANT: Uses ONNX Runtime - NO HUGGINGFACE AUTH NEEDED AT RUNTIME!
#
# =============================================================================

metadata:
  name: onnx-facebookresearch-sam3-detector
  namespace: cvat
  annotations:
    name: SAM3 Detector (ONNX)
    version: 1
    type: detector
    spec:
    framework: onnx
    supports_text_prompt: true
    help_message: |
      SAM3 text-to-segment detector using Promptable Cascade Segmentation (PCS).
      Supports 270K+ object concepts via text descriptions.
      Uses ONNX Runtime (no HuggingFace auth needed at runtime).

      Enter comma-separated object descriptions, e.g.: "person, car, dog"

      This function also powers the SAM3 interactor and tracker via proxies.

spec:
  description: SAM3 Detector using ONNX Runtime - main function with all models
  runtime: 'python:3.10'
  handler: main:handler
  eventTimeout: 120s

  env:
    - name: PYTHONPATH
      value: /opt/nuclio/sam3
    # Model paths (relative to /opt/nuclio/sam3/models/)
    - name: SAM3_MODEL_DIR
      value: /opt/nuclio/sam3/models
    - name: SAM3_VISION_ENCODER
      value: /opt/nuclio/sam3/models/vision_encoder.onnx
    - name: SAM3_TEXT_ENCODER
      value: /opt/nuclio/sam3/models/text_encoder.onnx
    - name: SAM3_PCS_DECODER
      value: /opt/nuclio/sam3/models/pcs_decoder.onnx
    - name: SAM3_TRACKER_DECODER
      value: /opt/nuclio/sam3/models/tracker_decoder.onnx
    # Redis for video tracking state
    - name: REDIS_HOST
      value: cvat_redis
    - name: REDIS_PORT
      value: "6379"
    - name: REDIS_PASSWORD
      value: ""
    - name: REDIS_TTL
      value: "3600"

  build:
    image: cvat.onnx.facebookresearch.sam3.detector:latest-gpu
    baseImage: nvidia/cuda:12.4.1-cudnn-runtime-ubuntu22.04

    directives:
      preCopy:
      # Set NVIDIA container runtime
        - kind: ENV
          value: NVIDIA_VISIBLE_DEVICES=all
      # Disable interactive frontend
        - kind: ENV
          value: DEBIAN_FRONTEND=noninteractive
      # Set workdir
        - kind: WORKDIR
          value: /opt/nuclio/sam3
      # Install system dependencies
        - kind: RUN
          value: |
            apt-get update && \
            apt-get -y install curl git python3 python3-pip ffmpeg libsm6 libxext6 && \
            rm -rf /var/lib/apt/lists/*
      # Install Python dependencies (transformers for CLIP tokenizer in PCS mode)
        - kind: RUN
          value: pip3 install --no-cache-dir numpy pillow opencv-python-headless onnxruntime-gpu redis transformers
      # Create models directory
        - kind: RUN
          value: mkdir -p /opt/nuclio/sam3/models
      # =======================================================================
      # ONNX MODELS - Downloaded from GitHub release
      # =======================================================================
      # Models are pre-exported and hosted on GitHub releases.
      # Download URL: https://github.com/dk-teknologisk-jahs/cvat/releases/tag/sam3
      # =======================================================================
        - kind: RUN
          value: |
            cd /opt/nuclio/sam3/models && \
            curl -L -o vision_encoder.onnx "https://github.com/dk-teknologisk-jahs/cvat/releases/download/sam3/vision_encoder.onnx" && \
            curl -L -o tracker_decoder.onnx "https://github.com/dk-teknologisk-jahs/cvat/releases/download/sam3/tracker_decoder.onnx" && \
            curl -L -o text_encoder.onnx "https://github.com/dk-teknologisk-jahs/cvat/releases/download/sam3/text_encoder.onnx" && \
            curl -L -o pcs_decoder.onnx "https://github.com/dk-teknologisk-jahs/cvat/releases/download/sam3/pcs_decoder.onnx"
      # Map python3 to python
        - kind: RUN
          value: ln -s /usr/bin/pip3 /usr/local/bin/pip && ln -s /usr/bin/python3 /usr/bin/python

  triggers:
    myHttpTrigger:
      maxWorkers: 1
      kind: 'http'
      workerAvailabilityTimeoutMilliseconds: 30000
      attributes:
        maxRequestBodySize: 67108864  # 64MB

  resources:
    limits:
      nvidia.com/gpu: 1

  platform:
    attributes:
      restartPolicy:
        name: always
        maximumRetryCount: 3
      mountMode: volume
